version: '3.8'

services:
  api:
    build: ./backend
    container_name: morphtriage_api
    ports:
      - "8000:8000"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - REDIS_HOST=redis
    depends_on:
      - redis
    volumes:
      - ./backend:/app

  redis:
    image: redis:alpine
    container_name: morphtriage_redis
    ports:
      - "6379:6379"